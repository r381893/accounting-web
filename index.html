<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>重構版記帳系統</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
    }
    form label {
      display: block;
      margin: 10px 0 5px;
    }
    form input, form button {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    form button {
      background: #007bff;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    form button:hover {
      background: #0056b3;
    }
    .record {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }
    .record:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>重構版記帳系統</h1>
    <form id="recordForm">
      <label for="date">日期：</label>
      <input type="date" id="date" name="date" required>

      <label for="category">類別：</label>
      <input type="text" id="category" name="category" placeholder="例如：餐飲、交通" required>

      <label for="amount">金額：</label>
      <input type="number" id="amount" name="amount" step="0.01" placeholder="請輸入金額" required>

      <label for="notes">備註：</label>
      <input type="text" id="notes" name="notes" placeholder="備註">

      <button type="submit">送出記錄</button>
    </form>

    <h2>記錄列表</h2>
    <div id="records">正在載入資料...</div>
  </div>

  <script>
    // 注意：請替換下行 URL 為你最新部署後 Google Apps Script 的 Web App URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxT_yFw54Jv219bprZEMuig26qHq5QK0Xv7rnmYz-QshVxFRc22fsYUCNmTlexfKQEIXQ/exec';

    // 讀取現有記錄並顯示
    async function loadRecords() {
      try {
        const response = await fetch(scriptURL);
        if (!response.ok) {
          throw new Error(`網路回應錯誤，狀態碼 ${response.status}`);
        }
        const records = await response.json();
        const recordsContainer = document.getElementById("records");
        if (records.length === 0) {
          recordsContainer.innerHTML = "<p>目前還沒有記錄。</p>";
          return;
        }
        recordsContainer.innerHTML = records.map(record => `
          <div class="record">
            <strong>${record.date}</strong> - ${record.category} - ${record.amount} 元<br>
            <em>${record.notes}</em>
          </div>
        `).join('');
      } catch (error) {
        console.error('載入資料發生錯誤：', error);
        document.getElementById("records").innerHTML = "<p>資料載入失敗。</p>";
      }
    }

    // 處理表單送出
    document.getElementById("recordForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      try {
        const response = await fetch(scriptURL, {
          method: 'POST',
          body: formData
        });
        if (!response.ok) {
          throw new Error(`送出回應錯誤，狀態碼 ${response.status}`);
        }
        const result = await response.json();
        if (result.result === "success") {
          alert("資料送出成功！");
          this.reset();
          loadRecords();  // 重新載入最新資料
        } else {
          alert("送出失敗，請稍後再試！");
        }
      } catch (error) {
        console.error("送出過程錯誤：", error);
        alert("送出資料時發生錯誤！");
      }
    });

    // 頁面載入完成後，載入記錄
    document.addEventListener("DOMContentLoaded", loadRecords);
  </script>
</body>
</html>
