<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>雲端記事本</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>雲端記事本</h1>
    <form id="noteForm">
      <label>日期 <input type="date" id="date" required /></label>
      <label>時間 <input type="time" id="time" required /></label>
      <label>價格 <input type="number" id="price" required /></label>
      <label>內容 <input type="text" id="content" required /></label>
      <button type="submit">新增紀錄</button>
    </form>
    <hr />
    <div id="recordList"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
