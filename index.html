<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>雲端記事本</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="https://fav.farm/📝" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: "Noto Sans TC", sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 1rem;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    label {
      display: block;
      margin-bottom: 1rem;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.3rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background-color: #2980b9;
    }
    .note {
      background: #ecf0f1;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
    }
    .delete-btn {
      margin-top: 6px;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
    canvas {
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>雲端記事本</h1>
    <form id="noteForm">
      <label>日期
        <input type="date" id="date" required />
      </label>
      <label>時間
        <input type="time" id="time" required />
      </label>
      <label>價格
        <input type="number" id="price" required />
      </label>
      <label>內容
        <input type="text" id="content" required />
      </label>
      <button type="submit">新增紀錄</button>
    </form>

    <canvas id="dailyChart" height="200"></canvas>
    <canvas id="monthlyChart" height="200"></canvas>
    <div id="recordList"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
